name: WishWithMe
options:
  bundleIdPrefix: com.wishwithme
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.2"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_PREVIEWS: YES
    DEVELOPMENT_TEAM: ""
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_OPTIMIZATION_LEVEL: -O

packages:
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: 4.2.0
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: 7.10.0

targets:
  WishWithMe:
    type: application
    platform: iOS
    sources:
      - path: WishWithMe
        excludes:
          - "**/.gitkeep"
    resources:
      - path: WishWithMe/Resources
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        INFOPLIST_FILE: WishWithMe/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.wishwithme.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
    dependencies:
      - package: KeychainAccess
      - package: Kingfisher
    entitlements:
      path: WishWithMe/Resources/WishWithMe.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:wishwith.me
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.wishwithme.app

  WishWithMeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WishWithMeTests
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        INFOPLIST_FILE: WishWithMeTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.wishwithme.app.tests
    dependencies:
      - target: WishWithMe

  WishWithMeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WishWithMeUITests
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        INFOPLIST_FILE: WishWithMeUITests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.wishwithme.app.uitests
    dependencies:
      - target: WishWithMe

schemes:
  WishWithMe:
    build:
      targets:
        WishWithMe: all
        WishWithMeTests: [test]
        WishWithMeUITests: [test]
    run:
      config: Debug
      commandLineArguments:
        "-com.apple.CoreData.SQLDebug": false
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - WishWithMe
      targets:
        - WishWithMeTests
        - WishWithMeUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
