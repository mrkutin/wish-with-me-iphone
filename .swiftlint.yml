# SwiftLint configuration for WishWithMe iOS App

included:
  - WishWithMe
  - WishWithMeTests
  - WishWithMeUITests

excluded:
  - .build
  - DerivedData
  - Pods

# Rules
disabled_rules:
  - trailing_whitespace
  - line_length

opt_in_rules:
  - empty_count
  - empty_string
  - closure_spacing
  - contains_over_first_not_nil
  - discouraged_object_literal
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_random
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - prohibited_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

# Configuration
identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - i
    - j
    - ok

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 50
    error: 60

function_body_length:
  warning: 50
  error: 100

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 300
  error: 500

nesting:
  type_level:
    warning: 2
    error: 3
  function_level:
    warning: 3
    error: 5

cyclomatic_complexity:
  warning: 15
  error: 25

# Custom rules
custom_rules:
  no_userdefaults_token:
    name: "No UserDefaults for Tokens"
    regex: "UserDefaults.*token|token.*UserDefaults"
    message: "Never store tokens in UserDefaults. Use Keychain instead."
    severity: error

  no_print_statements:
    name: "No Print Statements"
    regex: "\\bprint\\s*\\("
    message: "Use proper logging instead of print statements."
    severity: warning
    match_kinds:
      - identifier

  force_https:
    name: "Force HTTPS"
    regex: "http://(?!localhost|127\\.0\\.0\\.1)"
    message: "Use HTTPS for all external URLs."
    severity: error
