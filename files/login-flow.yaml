# Login Flow - Wish With Me iOS
# Tests: email/password login → navigate to wishlists
appId: me.wishwith.app
---
- launchApp
- assertVisible: "Log In"
- tapOn: "Email"
- inputText: "test@example.com"
- tapOn: "Password"
- inputText: "CHANGEME"
- tapOn: "Log In"
- extendedWaitUntil:
    visible: "My Wishlists"
    timeout: 10000
