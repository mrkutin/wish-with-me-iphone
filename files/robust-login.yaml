# Robust login that handles keyboard popover
appId: me.wishwith.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Sign In"
    timeout: 10000
- tapOn: "Email"
- inputText: "test@example.com"
- pressKey: Enter
- tapOn: "Password"
- inputText: "CHANGEME"
- pressKey: Enter
- extendedWaitUntil:
    visible: "Wishlists"
    timeout: 20000
